name: Build and Push Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  build:
    if: github.event_name == 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute new version tag
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        id: tag
        run: |
          git fetch --tags
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VER="${PREV#v}"
          MAJ=$(echo "$VER" | cut -d. -f1 | sed 's/^0*//'); MAJ=${MAJ:-0}
          MIN=$(echo "$VER" | cut -d. -f2 | sed 's/^0*//'); MIN=${MIN:-0}
          PAT=$(echo "$VER" | cut -d. -f3 | sed 's/^0*//'); PAT=${PAT:-0}
          while git rev-parse "v${MAJ}.${MIN}.${PAT}" >/dev/null 2>&1; do
            PAT=$((10#$PAT + 1))
          done
          NEW_TAG="v${MAJ}.${MIN}.${PAT}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "version=${NEW_TAG#v}" >> $GITHUB_OUTPUT

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/akinus21/akai-net:latest
            ghcr.io/akinus21/akai-net:${{ steps.tag.outputs.version || 'pr' }}
          no-cache: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            LLAMACPP_VERSION=a8681a0

      - name: Create git tag and GitHub release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          git config user.email "iron-bot@akinus21.com"
          git config user.name "Iron Bot"
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          TAG="${{ steps.tag.outputs.new_tag }}"
          git tag -a "$TAG" -m "Release $TAG" -f
          git push origin "$TAG" -f
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "${{ github.repository }}" \
              --title "$TAG" \
              --notes "Docker image: \`ghcr.io/akinus21/akai-net:${{ steps.tag.outputs.version }}\`"
          else
            gh release create "$TAG" --repo "${{ github.repository }}" \
              --title "$TAG" \
              --notes "Docker image: \`ghcr.io/akinus21/akai-net:${{ steps.tag.outputs.version }}\`"
          fi

      - name: Notify webhook — success
        if: >
          success() &&
          github.ref == 'refs/heads/main' &&
          github.event_name != 'pull_request'
        env:
          WEBHOOK_HMAC_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TAG="${{ steps.tag.outputs.new_tag }}"
          IMAGE="ghcr.io/akinus21/akai-net:${{ steps.tag.outputs.version }}"
          printf '%s' "$(jq -cn \
            --arg event  "build_success" \
            --arg repo   "${{ github.repository }}" \
            --arg run_url "$RUN_URL" \
            --arg sha    "${{ github.sha }}" \
            --arg ref    "${{ github.ref_name }}" \
            --arg actor  "${{ github.actor }}" \
            --arg tag    "$TAG" \
            --arg image  "$IMAGE" \
            '{event:$event,repo:$repo,run_url:$run_url,sha:$sha,ref:$ref,actor:$actor,tag:$tag,image:$image}')" > /tmp/webhook-payload.json
          SIG=$(openssl dgst -sha256 -hmac "$WEBHOOK_HMAC_SECRET" /tmp/webhook-payload.json | awk '{print "sha256="$2}')
          curl -fsSL --max-time 15 --retry 3 \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_success" \
            -H "X-Hub-Signature-256: $SIG" \
            --data-binary @/tmp/webhook-payload.json \
            "https://webhook.akinus21.com/webhook/akai-net-build" || true
          echo "Webhook notification completed"

      - name: Collect build logs on failure
        if: failure()
        run: |
          LOGS="Docker build failed. No detailed logs available."
          if [ -n "${{ steps.build.outputs.imageid }}" ]; then
            LOGS="Docker build failed. Image ID: ${{ steps.build.outputs.imageid }}"
          fi
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "BUILD_LOGS<<EOFMARKER" >> $GITHUB_ENV
          echo "$LOGS" >> $GITHUB_ENV
          echo "EOFMARKER" >> $GITHUB_ENV
          echo "RUN_URL=$RUN_URL" >> $GITHUB_ENV

      - name: Notify webhook — failure
        if: failure()
        env:
          WEBHOOK_HMAC_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SECRET_KEY="${WEBHOOK_HMAC_SECRET:-fallback_unsigned_key}"
          ERROR_TEXT="Docker build failed. See $RUN_URL"
          if [ -n "${{ secrets.GH_TOKEN }}" ]; then
            LOGS=$(gh run view ${{ github.run_id }} --repo "${{ github.repository }}" --log 2>/dev/null | tail -200 || echo "")
            if [ -n "$LOGS" ]; then
              ERROR_TEXT="$LOGS"
            fi
          fi
          printf '%s' "$(printf '%s' "$ERROR_TEXT" | jq -Rn \
            --arg event   "build_failure" \
            --arg repo    "${{ github.repository }}" \
            --arg run_url "$RUN_URL" \
            --arg sha     "${{ github.sha }}" \
            --arg ref     "${{ github.ref_name }}" \
            --arg actor   "${{ github.actor }}" \
            '{event:$event,repo:$repo,run_url:$run_url,sha:$sha,ref:$ref,actor:$actor,error:[inputs]|join("\n")}')" > /tmp/webhook-payload.json
          SIG=$(openssl dgst -sha256 -hmac "$SECRET_KEY" /tmp/webhook-payload.json | awk '{print "sha256="$2}')
          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_failure" \
            -H "X-Hub-Signature-256: $SIG" \
            -d @/tmp/webhook-payload.json \
            "https://webhook.akinus21.com/webhook/akai-net-build" || true