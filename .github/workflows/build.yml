name: Build and Push Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  build:
    if: github.event_name == 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute new version tag
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        id: tag
        run: |
          git fetch --tags
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VER="${PREV#v}"
          MAJ=$(echo "$VER" | cut -d. -f1 | sed 's/^0*//'); MAJ=${MAJ:-0}
          MIN=$(echo "$VER" | cut -d. -f2 | sed 's/^0*//'); MIN=${MIN:-0}
          PAT=$(echo "$VER" | cut -d. -f3 | sed 's/^0*//'); PAT=${PAT:-0}
          while git rev-parse "v${MAJ}.${MIN}.${PAT}" >/dev/null 2>&1; do
            PAT=$((10#$PAT + 1))
          done
          NEW_TAG="v${MAJ}.${MIN}.${PAT}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "version=${NEW_TAG#v}" >> $GITHUB_OUTPUT

      - name: Build and push image
        id: build
        run: |
          set -o pipefail
          PUSH_FLAG=""
          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
            PUSH_FLAG="--push"
          fi
          docker buildx build \
            --progress=plain \
            --no-cache \
            --build-arg LLAMACPP_VERSION=a8681a0 \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -t ghcr.io/akinus21/akai-net:latest \
            -t ghcr.io/akinus21/akai-net:${{ steps.tag.outputs.version || 'pr' }} \
            $PUSH_FLAG \
            . 2>&1 | tee /tmp/docker-build.log

      - name: Create git tag and GitHub release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          git config user.email "iron-bot@akinus21.com"
          git config user.name "Iron Bot"
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          TAG="${{ steps.tag.outputs.new_tag }}"
          git tag -a "$TAG" -m "Release $TAG" -f
          git push origin "$TAG" -f
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "${{ github.repository }}" \
              --title "$TAG" \
              --notes "Docker image: \`ghcr.io/akinus21/akai-net:${{ steps.tag.outputs.version }}\`"
          else
            gh release create "$TAG" --repo "${{ github.repository }}" \
              --title "$TAG" \
              --notes "Docker image: \`ghcr.io/akinus21/akai-net:${{ steps.tag.outputs.version }}\`"
          fi

      - name: Collect build logs on failure
        if: failure()
        run: |
          {
            echo "=== ENV ==="
            echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
            echo "ANDROID_HOME=$ANDROID_HOME"
            echo ""
            echo "=== Docker build log ==="
            cat /tmp/docker-build.log 2>/dev/null || echo "No build log captured"
          } > /tmp/build-errors.txt
          cat /tmp/build-errors.txt

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/docker-build.log
          retention-days: 5

  webhook-failure:
    needs: [build]
    if: failure()
    runs-on: ubuntu-latest
    name: Webhook Notification for Build #${{ github.run_number }}
    steps:
      - name: Download build logs
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.run_id }}
          name: build-logs
          path: /tmp/logs
        continue-on-error: true

      - name: Collect logs
        run: |
          LOG_FILE=""
          for f in /tmp/logs/build.log /tmp/logs/build-errors.txt /tmp/docker-build.log; do
            if [ -f "$f" ] && [ -s "$f" ]; then
              LOG_FILE="$f"
              break
            fi
          done
          if [ -z "$LOG_FILE" ]; then
            mkdir -p /tmp/logs
            echo "No build logs available" > /tmp/logs/build.log
            LOG_FILE=/tmp/logs/build.log
          fi
          echo "LOG_FILE=$LOG_FILE" >> $GITHUB_ENV
          LINES=$(wc -l < "$LOG_FILE" 2>/dev/null || echo 0)
          echo "LOG_LINES=$LINES" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to pasty
        id: pasty
        run: |
          python3 -c "$(echo '' | base64 -d)"

      - name: Extract errors (max 25 lines)
        id: errors
        run: |
          LOG_FILE="${{ env.LOG_FILE }}"
          if [ -z "$LOG_FILE" ] || [ ! -f "$LOG_FILE" ] || [ ! -s "$LOG_FILE" ]; then
            echo "error_context=Build failed. No logs available." >> $GITHUB_OUTPUT
            exit 0
          fi

          ERRORS=$(grep -n -iE 'error\[E[0-9]+\]|error:|fatal|cannot find|not found|compilation failed|FAILED' \
            "$LOG_FILE" 2>/dev/null | head -5 | cut -d: -f1 | tr '\n' ' ')

          if [ -z "$ERRORS" ]; then
            CONTEXT=$(tail -25 "$LOG_FILE" 2>/dev/null)
          else
            CONTEXT=""
            for LINE in $ERRORS; do
              START=$((LINE - 3))
              [ $START -lt 1 ] && START=1
              CHUNK=$(sed -n "${START},$((LINE + 3))p" "$LOG_FILE" 2>/dev/null)
              CONTEXT="${CONTEXT}--- error near line ${LINE} ---\n${CHUNK}\n"
            done
            CONTEXT=$(echo -e "$CONTEXT" | tail -25)
          fi

          echo "error_context<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTEXT" | head -25 >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send webhook
        env:
          WEBHOOK_HMAC_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          REF: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          PASTY_URL: ${{ steps.pasty.outputs.pasty_url }}
          BUILD_NUM: ${{ github.run_number }}
          ERROR_CTX: ${{ steps.errors.outputs.error_context }}
        run: |
          printf -v MESSAGE 'The %s build in the %s branch failed with the following errors:\n\n%s\n\nThe full text can be found at the following pasty url(s):\n%s\n' \
            "$REPO" "$REF" "$ERROR_CTX" "$PASTY_URL"
          jq -n \
            --arg event "build_failure" \
            --arg repo "$REPO" \
            --arg run_url "$RUN_URL" \
            --arg sha "$SHA" \
            --arg ref "$REF" \
            --arg actor "$ACTOR" \
            --arg pasty_url "$PASTY_URL" \
            --arg build_num "$BUILD_NUM" \
            --arg error "$ERROR_CTX" \
            --arg message "$MESSAGE" \
            '{event:$event,repo:$repo,run_url:$run_url,sha:$sha,ref:$ref,actor:$actor,pasty_url:$pasty_url,build_num:$build_num,error:$error,message:$message}' > /tmp/payload.json
          SIG=$(openssl dgst -sha256 -hmac "$WEBHOOK_HMAC_SECRET" /tmp/payload.json | awk '{print "sha256="$2}')
          for i in $(seq 1 60); do
            if curl -fsSL -X POST \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Event: build_failure" \
              -H "X-Hub-Signature-256: $SIG" \
              --data-binary @/tmp/payload.json \
              "https://webhook.akinus21.com/webhook/akai-net-build"; then
              echo "Webhook sent successfully"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Webhook failed after 60 attempts"